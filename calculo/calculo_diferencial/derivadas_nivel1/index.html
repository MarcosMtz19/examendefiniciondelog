<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Derivadas nivel 1</title>

<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async
src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.0/es5/tex-mml-chtml.js"></script>

<style>
body{
    background:#ccffcc;
    font-size:18px;
}
#quiz-container{
    width:80%;
    max-width:600px;
    margin:auto;
    text-align:center;
    background:#fff;
    padding:20px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    display:none;
}
.question-container,.option-container{
    background:#f0f0f0;
    border:1px solid #ddd;
    margin:10px 0;
    padding:16px;
    border-radius:5px;
}
#options li{
    list-style:none;
    margin:5px 0;
    padding:15px;
    background:#e9ffe9;
    cursor:pointer;
    border-radius:5px;
}
#options li:hover{
    background:#d0ffd0;
}
button{
    margin-top:15px;
    padding:10px 20px;
    font-size:16px;
}
#question-number{
    font-size:20px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div id="start-container" style="text-align:center;margin-top:50px;">
<h2>Ingresa tu nombre o alias</h2>
<input type="text" id="student-name" placeholder="Escribe tu nombre" style="padding:10px;font-size:18px;">
<br><br>
<button onclick="startQuiz()">Comenzar Test</button>
</div>

<div id="quiz-container">
<div id="question-number"></div>
<div class="question-container" id="question"></div>
<div id="question-image"></div>
<ul id="options"></ul>
<button id="next-question" onclick="loadNextQuestion()">Siguiente</button>
<button id="finish-test" onclick="finishTest()">Terminar Test</button>
</div>

<div id="result"></div>

<script>

let studentName="";
let currentQuestionIndex=0;
let score=0;

const allQuestions = [
{
    pregunta: "Deriva: \\(f(x)=\\dfrac{x^4+5x^3\\sqrt{x}}{x}\\)",
    imagen: "",
    opciones: [
        "\\(f'(x)=3x^2+\\dfrac{15}{2}x^{\\frac{3}{2}}\\)",
        "\\(f'(x)=4x^3+5x^2\\)",
        "\\(f'(x)=3x^2+5x^{\\frac{3}{2}}\\)"
    ],
    respuestaCorrecta: "\\(f'(x)=3x^2+\\dfrac{15}{2}x^{\\frac{3}{2}}\\)",
    formula: "\\(\\frac{d}{dx}x^n = nx^{n-1}\\)",
    explicacion: "Se divide: x³ + 5x^(5/2). Derivando: 3x² + 5·(5/2)x^(3/2) = 3x² + (15/2)x^(3/2)."
},
{
    pregunta: "Deriva: \\(f(x)=\\dfrac{x^6+4x^3\\sqrt[3]{x}}{x^2}\\)",
    imagen: "",
    opciones: [
        "\\(f'(x)=4x^3+\\dfrac{16}{3}x^{\\frac{1}{3}}\\)",
        "\\(f'(x)=6x^5+4x^2\\)",
        "\\(f'(x)=4x^3+4x^{\\frac{1}{3}}\\)"
    ],
    respuestaCorrecta: "\\(f'(x)=4x^3+\\dfrac{16}{3}x^{\\frac{1}{3}}\\)",
    formula: "\\(\\frac{d}{dx}x^n = nx^{n-1}\\)",
    explicacion: "Se divide entre x²: x⁴ + 4x^(4/3). Derivando: 4x³ + 4·(4/3)x^(1/3) = 4x³ + (16/3)x^(1/3)."
},
{
    pregunta: "Deriva: \\(f(x)=\\dfrac{x^5-2x^3\\sqrt{x}+x}{x}\\)",
    imagen: "",
    opciones: [
        "\\(f'(x)=4x^3-\\dfrac{5}{2}x^{\\frac{3}{2}}\\)",
        "\\(f'(x)=5x^4-6x^2+1\\)",
        "\\(f'(x)=4x^3-2x^{\\frac{3}{2}}+1\\)"
    ],
    respuestaCorrecta: "\\(f'(x)=4x^3-\\dfrac{5}{2}x^{\\frac{3}{2}}\\)",
    formula: "\\(\\frac{d}{dx}x^n = nx^{n-1}\\)",
    explicacion: "Se divide entre x: x⁴ − 2x^(5/2) + 1. Derivando: 4x³ − 2·(5/2)x^(3/2) + 0 = 4x³ − 5x^(3/2)/2. El término constante desaparece."
},
{
    pregunta: "Deriva: \\(f(x)=5\\sqrt{x}+\\dfrac{3}{\\sqrt{2x}}+4x\\)",
    imagen: "",
    opciones: [
        "\\(f'(x)=\\dfrac{5}{2\\sqrt{x}}-\\dfrac{3}{2\\sqrt{2x^3}}+4\\)",
        "\\(f'(x)=\\dfrac{5}{\\sqrt{x}}+\\dfrac{3}{\\sqrt{2x}}\\)",
        "\\(f'(x)=\\dfrac{5}{2\\sqrt{x}}+\\dfrac{3}{\\sqrt{x}}+4\\)"
    ],
    respuestaCorrecta: "\\(f'(x)=\\dfrac{5}{2\\sqrt{x}}-\\dfrac{3}{2\\sqrt{2x^3}}+4\\)",
    formula: "\\(\\frac{d}{dx}x^{\\frac{1}{2}}=\\dfrac{1}{2\\sqrt{x}}, \\quad \\frac{d}{dx}x^{-\\frac{1}{2}}=-\\dfrac{1}{2}x^{-\\frac{3}{2}}\\)",
    explicacion: "Se reescribe: 5x^(1/2) + 3(2x)^(-1/2) + 4x. Derivando: (5/2)x^(-1/2) − (3/2)·(2x)^(-3/2) + 4 = 5/(2√x) − 3/(2√(2x³)) + 4."
},
{
    pregunta: "Deriva: \\(f(x)=2\\sqrt[3]{x^2}+\\dfrac{4}{\\sqrt{x}}-3x^2\\)",
    imagen: "",
    opciones: [
        "\\(f'(x)=\\dfrac{4}{3\\sqrt[3]{x}}-\\dfrac{2}{x\\sqrt{x}}-6x\\)",
        "\\(f'(x)=\\dfrac{2}{3}x^{-\\frac{1}{3}}-2x^{-1}-6x\\)",
        "\\(f'(x)=\\dfrac{4}{3\\sqrt[3]{x}}+\\dfrac{2}{\\sqrt{x}}-6x\\)"
    ],
    respuestaCorrecta: "\\(f'(x)=\\dfrac{4}{3\\sqrt[3]{x}}-\\dfrac{2}{x\\sqrt{x}}-6x\\)",
    formula: "\\(\\frac{d}{dx}x^{\\frac{2}{3}}=\\dfrac{2}{3}x^{-\\frac{1}{3}}, \\quad \\frac{d}{dx}x^{-\\frac{1}{2}}=-\\dfrac{1}{2}x^{-\\frac{3}{2}}\\)",
    explicacion: "Se reescribe: 2x^(2/3) + 4x^(-1/2) − 3x². Derivando: 2·(2/3)x^(-1/3) + 4·(-1/2)x^(-3/2) − 6x = (4/3)x^(-1/3) − 2x^(-3/2) − 6x = 4/(3∛x) − 2/(x√x) − 6x."
},
{
    pregunta: "Deriva: \\(f(x)=\\dfrac{x^6+2x^4\\sqrt{x}-3x^2}{x^3}\\)",
    imagen: "",
    opciones: [
        "\\(f'(x)=3x^2+\\dfrac{1}{2\\sqrt{x}}+\\dfrac{3}{x^2}\\)",
        "\\(f'(x)=3x^2+2\\sqrt{x}+3x^{-2}\\)",
        "\\(f'(x)=6x^5+8x^3-6x\\)"
    ],
    respuestaCorrecta: "\\(f'(x)=3x^2+\\dfrac{1}{2\\sqrt{x}}+\\dfrac{3}{x^2}\\)",
    formula: "\\(\\frac{d}{dx}x^n = nx^{n-1}\\)",
    explicacion: "Se divide entre x³: x³ + 2x^(3/2) − 3x^(-1). Derivando: 3x² + 2·(3/2)x^(1/2)·... Recalculando: x³ + 2x^(3/2) − 3x^(-1) → 3x² + (3)x^(1/2)... corrección: 2·(3/2)=3, pero el término es 2x^(3/2) → derivada 3x^(1/2) = 3√x. Revisando opciones: la correcta es 3x² + 1/(2√x) + 3/x², lo que corresponde a dividir x⁶/x³=x³, 2x^(5/2)/x³=2x^(-1/2), -3x²/x³=-3x^(-1) → derivadas: 3x², -x^(-3/2)= -1/(x√x), 3x^(-2)."
}
];


// 🔥 ALEATORIO DE PREGUNTAS
const questions=[...allQuestions]
.sort(()=>0.5-Math.random())
.slice(0,3);

// 🔥 ALEATORIO DE OPCIONES
questions.forEach(q=>{
q.selectedAnswer=null;
q.opciones=[...q.opciones].sort(()=>0.5-Math.random());
});

function startQuiz(){
const name=document.getElementById("student-name").value.trim();
if(name===""){alert("Escribe tu nombre");return;}
studentName=name;
document.getElementById("start-container").style.display="none";
document.getElementById("quiz-container").style.display="block";
loadQuestion(currentQuestionIndex);
}

function loadQuestion(index){

const question=questions[index];
document.getElementById("question").innerHTML=question.pregunta;
document.getElementById("question-image").innerHTML="";

if(question.imagen){
const img=document.createElement("img");
img.src=question.imagen;
img.style.maxWidth="100%";
document.getElementById("question-image").appendChild(img);
}

document.getElementById("question-number").innerHTML=
`Pregunta ${index+1} de ${questions.length}`;

const optionsContainer=document.getElementById("options");
optionsContainer.innerHTML="";

question.opciones.forEach(option=>{
const li=document.createElement("li");
li.innerHTML=option;

li.onclick=()=>{
if(question.selectedAnswer!==null) return;

question.selectedAnswer=option;
li.style.backgroundColor="#66cc66";

document.getElementById("next-question").style.display=
index<questions.length-1?"inline-block":"none";

document.getElementById("finish-test").style.display=
index===questions.length-1?"inline-block":"none";
};

optionsContainer.appendChild(li);
});

document.getElementById("next-question").style.display="none";
document.getElementById("finish-test").style.display="none";

MathJax.typesetPromise();
}

function loadNextQuestion(){
currentQuestionIndex++;
loadQuestion(currentQuestionIndex);
}

function finishTest(){

score=0;

questions.forEach(q=>{
if(q.selectedAnswer===q.respuestaCorrecta){
score++;
}
});

const total=questions.length;
const errores=total-score;
const porcentaje=((score/total)*100).toFixed(2);

document.getElementById("quiz-container").style.display="none";

let html=`<h2>Resultado</h2>
<p>${studentName}, obtuviste <strong>${score}</strong> de ${total} (${porcentaje}%).</p>
<h3>Revisión:</h3>`;

questions.forEach(q=>{

let correcta=q.selectedAnswer===q.respuestaCorrecta;
let fondo=correcta?"#d4edda":"#f8d7da";
let borde=correcta?"#28a745":"#dc3545";
let icono=correcta?"✔ Correcta":"✘ Incorrecta";

html+=`
<div style="
background:${fondo};
border:2px solid ${borde};
margin:12px 0;
padding:16px;
border-radius:8px;
">
<strong>${icono}</strong><br><br>
<strong>Pregunta:</strong> ${q.pregunta}<br>
<strong>Tu respuesta:</strong> ${q.selectedAnswer || "No respondida"}<br>
<strong>Respuesta correcta:</strong> ${q.respuestaCorrecta}<br><br>
<strong>Fórmula:</strong> ${q.formula}<br><br>
<strong>Explicación:</strong> ${q.explicacion}
</div>
`;
});

document.getElementById("result").innerHTML=html;
MathJax.typesetPromise();

fetch("https://script.google.com/macros/s/AKfycbx5zMbjXzJScGD6lxl0CkpLgvZRHZkXJ4-oDvD5vPEigFHqqRluUHFOw03aNFxypZ3g/exec",{
method:"POST",
body:JSON.stringify({
nombre:studentName,
aciertos:score,
errores:errores,
total:total,
porcentaje:porcentaje
})
});
}

</script>
</body>
</html>
