    const questions = getRandomQuestions(5);
    let currentQuestionIndex = 0;
    let score = 0;

    function getRandomQuestions(numQuestions) {
        const shuffled = allQuestions.sort(() => 0.5 - Math.random());
        return shuffled.slice(0, numQuestions);
    }

    function shuffleOptions(questions) {
        questions.forEach(question => {
            const correctAnswer = question.respuestaCorrecta;
            question.opciones = question.opciones.sort(() => Math.random() - 0.5);
            question.respuestaCorrectaIndex = question.opciones.indexOf(correctAnswer);
        });
    }

    shuffleOptions(allQuestions);

    function loadQuestion(questionIndex) {
        const question = questions[questionIndex];
        const questionDiv = document.getElementById('question');
        const questionImageDiv = document.getElementById('question-image');

        questionDiv.innerHTML = question.pregunta;
        questionImageDiv.innerHTML = ''; // Limpia cualquier imagen previa

        if (question.imagen) {
            const img = document.createElement('img');
            img.src = question.imagen;
            img.alt = "Imagen de la pregunta";
            img.style.maxWidth = "100%";
            img.style.height = "auto";
            questionImageDiv.appendChild(img);
        }

        document.getElementById('question-number').innerHTML = `Pregunta ${questionIndex + 1} de ${questions.length}`;
        const optionsContainer = document.getElementById('options');
        optionsContainer.innerHTML = '';

        question.opciones.forEach(function(option) {
            const optionElement = document.createElement('li');
            optionElement.className = 'option-container';
            optionElement.innerHTML = option;
            optionElement.onclick = function() {
                clearSelections();
                this.style.backgroundColor = '#66cc66'; // Seleccionado
                checkAnswer(option);
            };
            optionsContainer.appendChild(optionElement);
        });

        document.getElementById('next-question').style.display = questionIndex < questions.length - 1 ? 'block' : 'none';
        document.getElementById('previous-question').style.display = questionIndex > 0 ? 'block' : 'none';
        document.getElementById('finish-test').style.display = questionIndex === questions.length - 1 ? 'block' : 'none';

        MathJax.typesetPromise(); // Actualiza MathJax
    }

    function clearSelections() {
        document.querySelectorAll('#options li').forEach(function(option) {
            option.style.backgroundColor = '#e9ffe9'; // Restablece el color original
        });
    }

    function checkAnswer(selectedOption) {
        const question = questions[currentQuestionIndex];
        if (selectedOption === question.respuestaCorrecta) {
            score++;
        }
        question.selectedAnswer = selectedOption;

        if (currentQuestionIndex === questions.length - 1) {
            document.getElementById('next-question').style.display = 'none';
            document.getElementById('finish-test').style.display = 'block';
        }
    }

    function loadNextQuestion() {
        if (currentQuestionIndex < questions.length - 1) {
            currentQuestionIndex++;
            loadQuestion(currentQuestionIndex);
        }
    }

    function loadPreviousQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            loadQuestion(currentQuestionIndex);
        }
    }

    function finishTest() {
        showResults();
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('finish-test').style.display = 'none';
    }

    function showResults() {
        let resultsHtml = `<h2>Resultado</h2><p>Tu puntuaciÃġn es ${score} de ${questions.length}.</p><div><h3>Respuestas Correctas, FÃġrmulas Usadas y Explicaciones:</h3>`;

            <strong>FÃġrmula usada:</strong> ${question.formula}<br>
            <strong>ExplicaciÃġn:</strong> ${question.explicacion}</div>`;

            if (question.selectedAnswer) {
                resultsHtml += `<div class="option-container"><strong>Respuesta seleccionada:</strong> ${question.selectedAnswer}</div>`;
            }
        });
        resultsHtml += `</div>`;
