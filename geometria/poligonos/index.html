<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Poligonos</title>

<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async
src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.0/es5/tex-mml-chtml.js"></script>

<style>
body{
    background:#ccffcc;
    font-size:18px;
}
#quiz-container{
    width:80%;
    max-width:600px;
    margin:auto;
    text-align:center;
    background:#fff;
    padding:20px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    display:none;
}
.question-container,.option-container{
    background:#f0f0f0;
    border:1px solid #ddd;
    margin:10px 0;
    padding:16px;
    border-radius:5px;
}
#options li{
    list-style:none;
    margin:5px 0;
    padding:15px;
    background:#e9ffe9;
    cursor:pointer;
    border-radius:5px;
}
#options li:hover{
    background:#d0ffd0;
}
button{
    margin-top:15px;
    padding:10px 20px;
    font-size:16px;
}
#question-number{
    font-size:20px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div id="start-container" style="text-align:center;margin-top:50px;">
<h2>Ingresa tu nombre o alias</h2>
<input type="text" id="student-name" placeholder="Escribe tu nombre" style="padding:10px;font-size:18px;">
<br><br>
<button onclick="startQuiz()">Comenzar Test</button>
</div>

<div id="quiz-container">
<div id="question-number"></div>
<div class="question-container" id="question"></div>
<div id="question-image"></div>
<ul id="options"></ul>
<button id="next-question" onclick="loadNextQuestion()">Siguiente</button>
<button id="finish-test" onclick="finishTest()">Terminar Test</button>
</div>

<div id="result"></div>

<script>

let studentName="";
let currentQuestionIndex=0;
let score=0;

    const allQuestions = [
        {
            pregunta: "De la siguiente figura, ¿Cuánto vale el ángulo interior 'A'?",
            imagen: "https://i.imgur.com/pnVOJ99.png",
            opciones: [
                "\\(A=20°\\)",
                "\\(A=110°\\)",
                "\\(A=106°\\)"
            ],
            respuestaCorrecta: "\\(A=110°\\)",
            formula: "\\(s_i=180°(n-2)\\)",
            // Aquí incluimos el iframe en la explicación usando un template literal
            explicacion: "Detemina el total de la sumatoria de ángulos interiores, despeja a x y sustituye en el ángulo correspondiente"
        },
        {
            pregunta: "De la siguiente figura, ¿Cuánto vale la suma de los ángulos interiores 'A+B'?",
            imagen: "https://i.imgur.com/pnVOJ99.png",
            opciones: [
                "\\(A=216°\\)",
                "\\(A=126°\\)",
                "\\(A=106°\\)"
            ],
            respuestaCorrecta: "\\(A=216°\\)",
            formula: "\\(s_i=180°(n-2)\\)",
            // Aquí incluimos el iframe en la explicación usando un template literal
            explicacion: "Detemina el total de la sumatoria de ángulos interiores, despeja a x y sustituye en el ángulo correspondiente"
        },
                {
            pregunta: "De la siguiente figura, ¿Cuánto vale la suma de los ángulos interiores 'D+E'?",
            imagen: "https://i.imgur.com/pnVOJ99.png",
            opciones: [
                "\\(A=232°\\)",
                "\\(A=222°\\)",
                "\\(A=106°\\)"
            ],
            respuestaCorrecta: "\\(A=232°\\)",
            formula: "\\(s_i=180°(n-2)\\)",
            // Aquí incluimos el iframe en la explicación usando un template literal
            explicacion: "Detemina el total de la sumatoria de ángulos interiores, despeja a x y sustituye en el ángulo correspondiente"
        },
        {
            pregunta: "De la siguiente figura, ¿Cuánto vale el ángulo interior 'C'?",
            imagen: "https://i.imgur.com/pnVOJ99.png",
            opciones: [
                "\\(C=52°\\)",
                "\\(C=110°\\)",
                "\\(C=92°\\)"
            ],
            respuestaCorrecta: "\\(C=92°\\)",
            formula: "\\(s_i=180°(n-2)\\)",
            explicacion: "Detemina el total de la sumatoria de ángulos interiores, despeja a x y sustituye en el ángulo correspondiente"
        },
        {
            pregunta: "De la siguiente figura, ¿Cuánto vale el ángulo exterior 'A' y 'B'?",
            imagen: "https://i.imgur.com/BuJPixi.png",
            opciones: [
                "\\(A=54° : B=64°\\)",
                "\\(A=45° : B=46°\\)",
                "\\(A=50° : B=64°\\)"
            ],
            respuestaCorrecta: "\\(A=54° : B=64°\\)",
            formula: "\\(s_i=180°(n-2)\\)",
            explicacion:"Detemina el total de la sumatoria de ángulos interiores, despeja a x y sustituye en el ángulo correspondiente, luego restale el ángulo interno a 180 grados para hayar el externo."
        },
        {
            pregunta: "De la siguiente figura, ¿Cuánto vale la resta de los ángulos exteriores ''B-A' ?",
            imagen: "https://i.imgur.com/BuJPixi.png",
            opciones: [
                "\\(B-A=10°\\)",
                "\\(B-A=20°\\)",
                "\\(B-A=-10°\\)"
            ],
            respuestaCorrecta: "\\(B-A=10°\\)",
            formula: "\\(s_i=180°(n-2)\\)",
            explicacion:"Detemina el total de la sumatoria de ángulos interiores, despeja a x y sustituye en el ángulo correspondiente, luego restale el ángulo interno a 180 grados para hayar el externo."
        },
        {
            pregunta: "De la siguiente figura, ¿Cuánto vale el ángulo exterior 'D' y 'E'?",
            imagen: "https://i.imgur.com/BuJPixi.png",
            opciones: [
                "\\(D=64° : E=17°\\)",
                "\\(D=55° : E=71°\\)",
                "\\(D=46° : E=17°\\)"
            ],
            respuestaCorrecta: "\\(D=64° : E=17°\\)",
            formula: "\\(s_i=180°(n-2)\\)",
            explicacion:"Detemina el total de la sumatoria de ángulos interiores, despeja a x y sustituye en el ángulo correspondiente, luego restale el ángulo interno a 180 grados para hayar el externo."
        },
                {
            pregunta: "¿En qué polígono se pueden trazar 14 diagonales en total?",
            imagen: "",
            opciones: [
                "Heptágono",
                "Octágono",
                "Nonágono"
            ],
            respuestaCorrecta: "Heptágono",
            formula: "\\(D=\\frac{n(n-3)}{2}\\)",
            explicacion:"Se sustituye D=14 en la formúla y se despeja a n"
        },
                {
            pregunta: " Determina el polígono en que el número de diagonales en total son los 9/2 del número de lados.",
            imagen: "",
            opciones: [
                "Dodecágono",
                "Heptágono",
                "Nonágono"
            ],
            respuestaCorrecta: "Dodecágono",
            formula: "\\(D=\\frac{n(n-3)}{2}\\)",
            explicacion:"Se sustituye D en la formúla y se despeja a n"
        },
    ];

// 🔥 ALEATORIO DE PREGUNTAS
const questions=[...allQuestions]
.sort(()=>0.5-Math.random())
.slice(0,4);

// 🔥 ALEATORIO DE OPCIONES
questions.forEach(q=>{
q.selectedAnswer=null;
q.opciones=[...q.opciones].sort(()=>0.5-Math.random());
});

function startQuiz(){
const name=document.getElementById("student-name").value.trim();
if(name===""){alert("Escribe tu nombre");return;}
studentName=name;
document.getElementById("start-container").style.display="none";
document.getElementById("quiz-container").style.display="block";
loadQuestion(currentQuestionIndex);
}

function loadQuestion(index){

const question=questions[index];
document.getElementById("question").innerHTML=question.pregunta;
document.getElementById("question-image").innerHTML="";

if(question.imagen){
const img=document.createElement("img");
img.src=question.imagen;
img.style.maxWidth="100%";
document.getElementById("question-image").appendChild(img);
}

document.getElementById("question-number").innerHTML=
`Pregunta ${index+1} de ${questions.length}`;

const optionsContainer=document.getElementById("options");
optionsContainer.innerHTML="";

question.opciones.forEach(option=>{
const li=document.createElement("li");
li.innerHTML=option;

li.onclick=()=>{
if(question.selectedAnswer!==null) return;

question.selectedAnswer=option;
li.style.backgroundColor="#66cc66";

document.getElementById("next-question").style.display=
index<questions.length-1?"inline-block":"none";

document.getElementById("finish-test").style.display=
index===questions.length-1?"inline-block":"none";
};

optionsContainer.appendChild(li);
});

document.getElementById("next-question").style.display="none";
document.getElementById("finish-test").style.display="none";

MathJax.typesetPromise();
}

function loadNextQuestion(){
currentQuestionIndex++;
loadQuestion(currentQuestionIndex);
}

function finishTest(){

score=0;

questions.forEach(q=>{
if(q.selectedAnswer===q.respuestaCorrecta){
score++;
}
});

const total=questions.length;
const errores=total-score;
const porcentaje=((score/total)*100).toFixed(2);

document.getElementById("quiz-container").style.display="none";

let html=`<h2>Resultado</h2>
<p>${studentName}, obtuviste <strong>${score}</strong> de ${total} (${porcentaje}%).</p>
<h3>Revisión:</h3>`;

questions.forEach(q=>{

let correcta=q.selectedAnswer===q.respuestaCorrecta;
let fondo=correcta?"#d4edda":"#f8d7da";
let borde=correcta?"#28a745":"#dc3545";
let icono=correcta?"✔ Correcta":"✘ Incorrecta";

html+=`
<div style="
background:${fondo};
border:2px solid ${borde};
margin:12px 0;
padding:16px;
border-radius:8px;
">
<strong>${icono}</strong><br><br>
<strong>Pregunta:</strong> ${q.pregunta}<br>
<strong>Tu respuesta:</strong> ${q.selectedAnswer || "No respondida"}<br>
<strong>Respuesta correcta:</strong> ${q.respuestaCorrecta}<br><br>
<strong>Explicación:</strong> ${q.explicacion}
</div>
`;
});

document.getElementById("result").innerHTML=html;
MathJax.typesetPromise();

fetch("https://script.google.com/macros/s/AKfycbx5zMbjXzJScGD6lxl0CkpLgvZRHZkXJ4-oDvD5vPEigFHqqRluUHFOw03aNFxypZ3g/exec",{
method:"POST",
body:JSON.stringify({
nombre:studentName,
aciertos:score,
errores:errores,
total:total,
porcentaje:porcentaje
})
});
}

</script>
</body>
</html>
