<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Polígonos</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.0/es5/tex-mml-chtml.js"></script>
    <style>
        body {
            background-color: #ccffcc; /* Verde claro */
            font-size: 18px; /* Aumenta el tamaño de la letra en todo el cuerpo */
        }
        #quiz-container {
            width: 80%;
            max-width: 600px;
            margin: auto;
            text-align: center;
            background-color: #ffffff; /* Fondo blanco */
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1); /* Sombra suave */
            font-size: 20px; /* Aumenta el tamaño de la letra en el contenedor del cuestionario */
        }

        .question-container, .option-container {
            background-color: #f0f0f0; /* Fondo gris claro */
            border: 1px solid #ddd;
            margin: 10px 0;
            padding: 16px;
            border-radius: 5px;
            font-size: 20px; /* Aumenta el tamaño de la letra en las preguntas y opciones */
        }

        #options li {
            list-style: none;
            margin: 5px 0;
            padding: 15px;
            background-color: #e9ffe9; /* Verde muy claro */
            cursor: pointer;
            border-radius: 5px;
            font-size: 18px; /* Aumenta el tamaño de la letra en las opciones */
        }

        #options li:hover {
            background-color: #d0ffd0; /* Verde más fuerte al seleccionar */
        }

        #next-question, #previous-question, #finish-test {
            margin-top: 20px;
            padding: 14px 20px;
            font-size: 20px; /* Aumenta el tamaño de la letra en los botones */
            cursor: pointer;
            display: none;
        }

        #question-number {
            font-size: 20px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="question-number"></div>
    <div class="question-container" id="question"></div>
    <div id="question-image"></div>
    <ul id="options"></ul>
    <button id="previous-question" onclick="loadPreviousQuestion()">Pregunta anterior</button>
    <button id="next-question" onclick="loadNextQuestion()">Siguiente pregunta</button>
    <button id="finish-test" onclick="finishTest()" style="display:none;">Terminar Test</button>
</div>

<div id="result"></div>
<div id="selected-answers"></div>

<script>
    const allQuestions = [
        {
            pregunta: "De la siguiente figura, ¿Cuánto vale el ángulo interior 'A'?",
            imagen: "https://i.imgur.com/pnVOJ99.png",
            opciones: [
                "\\(A=20°\\)",
                "\\(A=110°\\)",
                "\\(A=106°\\)"
            ],
            respuestaCorrecta: "\\(A=110°\\)",
            formula: "\\(s_i=180°(n-2)\\)",
            // Aquí incluimos el iframe en la explicación usando un template literal
            explicacion: "Detemina el total de la sumatoria de ángulos interiores, despeja a x y sustituye en el ángulo correspondiente"
        },
        {
            pregunta: "De la siguiente figura, ¿Cuánto vale el ángulo interior 'C'?",
            imagen: "https://i.imgur.com/pnVOJ99.png",
            opciones: [
                "\\(C=52°\\)",
                "\\(C=110°\\)",
                "\\(C=92°\\)"
            ],
            respuestaCorrecta: "\\(C=92°\\)",
            formula: "\\(s_i=180°(n-2)\\)",
            explicacion: "Detemina el total de la sumatoria de ángulos interiores, despeja a x y sustituye en el ángulo correspondiente"
        },
        {
            pregunta: "De la siguiente figura, ¿Cuánto vale el ángulo exterior 'A' y 'B'?",
            imagen: "https://i.imgur.com/BuJPixi.png",
            opciones: [
                "\\(A=54° : B=64°\\)",
                "\\(A=45° : B=46°\\)",
                "\\(A=50° : B=64°\\)"
            ],
            respuestaCorrecta: "\\(A=54° : B=64°\\)",
            formula: "\\(s_i=180°(n-2)\\)",
            explicacion:"Detemina el total de la sumatoria de ángulos interiores, despeja a x y sustituye en el ángulo correspondiente, luego restale el ángulo interno a 180 grados para hayar el externo."
        },
        {
            pregunta: "De la siguiente figura, ¿Cuánto vale el ángulo exterior 'D' y 'E'?",
            imagen: "https://i.imgur.com/BuJPixi.png",
            opciones: [
                "\\(D=64° : E=17°\\)",
                "\\(D=55° : E=71°\\)",
                "\\(D=46° : E=17°\\)"
            ],
            respuestaCorrecta: "\\(D=64° : E=17°\\)",
            formula: "\\(s_i=180°(n-2)\\)",
            explicacion:"Detemina el total de la sumatoria de ángulos interiores, despeja a x y sustituye en el ángulo correspondiente, luego restale el ángulo interno a 180 grados para hayar el externo."
        },
                {
            pregunta: "¿En qué polígono se pueden trazar 14 diagonales en total?",
            imagen: "",
            opciones: [
                "Heptágono",
                "Octágono",
                "Nonágono"
            ],
            respuestaCorrecta: "Heptágono",
            formula: "\\(D=\\frac{n(n-3)}{2}\\)",
            explicacion:"Se sustituye D=14 en la formúla y se despeja a n"
        },
                {
            pregunta: " Determina el polígono en que el número de diagonales en total son los 9/2 del número de lados.",
            imagen: "",
            opciones: [
                "Dodecágono",
                "Heptágono",
                "Nonágono"
            ],
            respuestaCorrecta: "Dodecágono",
            formula: "\\(D=\\frac{n(n-3)}{2}\\)",
            explicacion:"Se sustituye D en la formúla y se despeja a n"
        },
    ];

    const questions = getRandomQuestions(4);
    let currentQuestionIndex = 0;
    let score = 0;

    function getRandomQuestions(numQuestions) {
        const shuffled = allQuestions.sort(() => 0.5 - Math.random());
        return shuffled.slice(0, numQuestions);
    }

    function shuffleOptions(questions) {
        questions.forEach(question => {
            const correctAnswer = question.respuestaCorrecta;
            question.opciones = question.opciones.sort(() => Math.random() - 0.5);
            question.respuestaCorrectaIndex = question.opciones.indexOf(correctAnswer);
        });
    }

    shuffleOptions(allQuestions);

    function loadQuestion(questionIndex) {
        const question = questions[questionIndex];
        const questionDiv = document.getElementById('question');
        const questionImageDiv = document.getElementById('question-image');

        questionDiv.innerHTML = question.pregunta;
        questionImageDiv.innerHTML = ''; // Limpia cualquier imagen previa

        if (question.imagen) {
            const img = document.createElement('img');
            img.src = question.imagen;
            img.alt = "Imagen de la pregunta";
            img.style.maxWidth = "100%";
            img.style.height = "auto";
            questionImageDiv.appendChild(img);
        }

        document.getElementById('question-number').innerHTML = `Pregunta ${questionIndex + 1} de ${questions.length}`;
        const optionsContainer = document.getElementById('options');
        optionsContainer.innerHTML = '';

        question.opciones.forEach(function(option) {
            const optionElement = document.createElement('li');
            optionElement.className = 'option-container';
            optionElement.innerHTML = option;
            optionElement.onclick = function() {
                clearSelections();
                this.style.backgroundColor = '#66cc66'; // Seleccionado
                checkAnswer(option);
            };
            optionsContainer.appendChild(optionElement);
        });

        document.getElementById('next-question').style.display = questionIndex < questions.length - 1 ? 'block' : 'none';
        document.getElementById('previous-question').style.display = questionIndex > 0 ? 'block' : 'none';
        document.getElementById('finish-test').style.display = questionIndex === questions.length - 1 ? 'block' : 'none';

        MathJax.typesetPromise(); // Actualiza MathJax
    }

    function clearSelections() {
        document.querySelectorAll('#options li').forEach(function(option) {
            option.style.backgroundColor = '#e9ffe9'; // Restablece el color original
        });
    }

    function checkAnswer(selectedOption) {
        const question = questions[currentQuestionIndex];
        if (selectedOption === question.respuestaCorrecta) {
            score++;
        }
        question.selectedAnswer = selectedOption;

        if (currentQuestionIndex === questions.length - 1) {
            document.getElementById('next-question').style.display = 'none';
            document.getElementById('finish-test').style.display = 'block';
        }
    }

    function loadNextQuestion() {
        if (currentQuestionIndex < questions.length - 1) {
            currentQuestionIndex++;
            loadQuestion(currentQuestionIndex);
        }
    }

    function loadPreviousQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            loadQuestion(currentQuestionIndex);
        }
    }

    function finishTest() {
        showResults();
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('finish-test').style.display = 'none';
    }

    function showResults() {
        let resultsHtml = `<h2>Resultado</h2><p>Tu puntuación es ${score} de ${questions.length}.</p><div><h3>Respuestas Correctas, Fórmulas Usadas y Explicaciones:</h3>`;
        questions.forEach(question => {
            resultsHtml += `<div class="option-container"><strong>Pregunta:</strong> ${question.pregunta} <br> 
            <strong>Respuesta correcta:</strong> ${question.respuestaCorrecta}<br>
            <strong>Fórmula usada:</strong> ${question.formula}<br>
            <strong>Explicación:</strong> ${question.explicacion}</div>`;

            if (question.selectedAnswer) {
                resultsHtml += `<div class="option-container"><strong>Respuesta seleccionada:</strong> ${question.selectedAnswer}</div>`;
            }
        });
        resultsHtml += `</div>`;
        document.getElementById('result').innerHTML = resultsHtml;

        // Añadir mensaje de contacto
        document.getElementById('result').innerHTML += `<p>Si te gustaría reforzar tu conocimiento puedo asesorarte, envíame mensaje vía WhatsApp <a href="https://wa.me/5540972313" target="_blank">5540972313</a>.</p>`;

        MathJax.typesetPromise();
    }

    // Carga la primera pregunta al iniciar
    loadQuestion(currentQuestionIndex);
</script>
</body>
</html>
